<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Нормы цеха 188</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 15px; padding-bottom: 160px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #1976D2; margin-bottom: 15px; font-size: 22px; }
        .status-bar { background: #4CAF50; color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .status-bar.offline { background: #f44336; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-header { font-weight: bold; font-size: 15px; margin-bottom: 8px; color: #333; line-height: 1.3; }
        .card-number { display: inline-block; background: #1976D2; color: white; padding: 3px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; margin-right: 8px; }
        .card-meta { font-size: 13px; color: #666; margin-bottom: 10px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        .input-group input:focus { outline: none; border-color: #1976D2; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #4CAF50; color: white; }
        .btn-edit { background: #2196F3; color: white; margin-top: 8px; width: 100%; padding: 10px; }
        .result { background: #FFF2CC; padding: 10px; border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .total { background: #C6EFCE; padding: 10px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; color: #006100; }
        .edit-section { display: none; margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .edit-section.show { display: block; }
        .edit-item { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .edit-item input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-remove { background: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-save { background: #2196F3; color: white; width: 100%; margin-top: 10px; padding: 10px; }
        .btn-close { background: #9e9e9e; color: white; width: 100%; margin-top: 5px; padding: 10px; }
        .action-btn { position: fixed; left: 50%; transform: translateX(-50%); color: white; padding: 15px 20px; border-radius: 25px; font-size: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: none; z-index: 1000; border: none; width: 90%; max-width: 500px; text-align: center; }
        .sync-btn { bottom: 80px; background: #FF9800; }
        .export-btn { bottom: 20px; background: #9C27B0; }
        .action-btn.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1> Нормы цеха 188</h1>
        <div class="status-bar" id="status-bar">🟢 Онлайн</div>
        <div id="cards"></div>
    </div>

    <button class="action-btn sync-btn" id="sync-btn" onclick="runSync()">🔄 Синхронизировать с Google</button>
    <button class="action-btn export-btn" id="export-btn" onclick="exportAndReset()"> Сохранить в Google, скачать Excel (А4) и сбросить</button>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfe9mA345oT_em_xK2OrjiY7KxwYIjG5COU5LhqTsAybm6bCUg_GxXDDU_kn6x5Hfv/exec';

        const defaultData = [
            {id: 1, name: "10-300 Перемещение, укладка тары эл штабелером", time: 0.28, values: [], synced: false},
            {id: 2, name: "50-300 Перемещение по скл кран-балкой", time: 0.34, values: [], synced: false},
            {id: 3, name: "50-450 Погрузка, выгрузка кран-балкой", time: 0.34, values: [], synced: false},
            {id: 4, name: "10-300 Погрузка, выгрузка пленки вручную", time: 0.56, values: [], synced: false},
            {id: 5, name: "50-300 Перемещение по скл рохлей", time: 0.28, values: [], synced: false},
            {id: 6, name: "50-500 Подъем, перемещение, укладка ПКИ эл штабелером", time: 0.28, values: [], synced: false},
            {id: 7, name: "10-300 Подъем, перемещение, укладка ПКИ тележкой", time: 0.28, values: [], synced: false},
            {id: 8, name: "50-300 Выгрузка ПКИ из машины эл. штабелером", time: 0.36, values: [], synced: false},
            {id: 9, name: "10-50 Погрузка, выгрузка материалов вручную", time: 0.58, values: [], synced: false},
            {id: 10, name: "10-50 Погрузка, выгрузка материалов эл штабелером", time: 0.3, values: [], synced: false},
            {id: 11, name: "10-50 Погрузка, выгрузка материалов тележкой", time: 0.36, values: [], synced: false},
            {id: 12, name: "50-250 Перемещение материалов тележкой", time: 0.28, values: [], synced: false},
            {id: 13, name: "50-250 Перемещение материалов эл штабелером", time: 0.28, values: [], synced: false},
            {id: 14, name: "10-50 Перемещение материалов вручную", time: 0.28, values: [], synced: false},
            {id: 15, name: "10-200 Выгрузка-погрузка ТМЦ вручную", time: 0.51, values: [], synced: false},
            {id: 16, name: "10-100 Укладка ТМЦ вручную", time: 0.42, values: [], synced: false},
            {id: 17, name: "10-50 Погрузка выгрузка бочек", time: 0.53, values: [], synced: false},
            {id: 18, name: "30-300 Выдача ТМЦ в цех рохлей", time: 0.51, values: [], synced: false},
            {id: 19, name: "250-500 Выдача ТМЦ в цех с помощью электроштабелера", time: 0.36, values: [], synced: false},
            {id: 20, name: "100-500 Выгрузка-погрузка препрега с помощью рохли", time: 0.30, values: [], synced: false},
            {id: 21, name: "100-500 Перемещение и укладка препрега с помощью рохли", time: 0.28, values: [], synced: false},
            {id: 22, name: "100-300 Погрузка-выгрузка ящиков БПЛА с помощью крана", time: 0.26, values: [], synced: false},
            {id: 23, name: "10-300 Укладка, сортировка и перемещение ящиков БПЛА вручную", time: 0.25, values: [], synced: false},
            {id: 24, name: "пленка машиной", time: 0.0, values: [], synced: false},
            {id: 25, name: "Стружка машиной", time: 0.0, values: [], synced: false},
            {id: 26, name: "картон машиной", time: 0.0, values: [], synced: false}
        ];

        function loadData() {
            const saved = localStorage.getItem('shop188_data');
            if (saved) {
                return JSON.parse(saved).map(item => ({...item, synced: item.synced || false}));
            }
            return defaultData;
        }

        function saveData(data) {
            localStorage.setItem('shop188_data', JSON.stringify(data));
            checkSyncStatus();
        }

        function calculateSum(values) {
            return values.reduce((sum, val) => sum + Number(val), 0);
        }

        function render() {
            const data = loadData();
            const container = document.getElementById('cards');
            container.innerHTML = '';
            data.forEach((item, index) => {
                const sum = calculateSum(item.values);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-number">№${item.id}</span> ${item.name}
                        ${item.synced ? '<span style="color: #4CAF50; font-size: 12px; margin-left: 5px;">✅</span>' : ''}
                    </div>
                    <div class="card-meta">Норма времени: ${item.time}</div>
                    <div class="input-group">
                        <input type="number" id="input-${index}" placeholder="Введите число" step="0.01">
                        <button class="btn btn-add" onclick="addValue(${index})">➕ Добавить</button>
                    </div>
                    ${item.values.length > 0 ? `
                        <div class="result">Расценка: ${item.values.join('+')}</div>
                        <div class="total">Количество: ${sum}</div>
                        <button class="btn btn-edit" onclick="toggleEdit(${index})">✏️ Редактировать значения</button>
                        <div class="edit-section" id="edit-${index}">
                            ${item.values.map((val, i) => `
                                <div class="edit-item">
                                    <input type="number" value="${val}" onchange="changeValue(${index}, ${i}, this.value)" step="0.01">
                                    <button class="btn-remove" onclick="removeValue(${index}, ${i})">🗑️</button>
                                </div>
                            `).join('')}
                            <button class="btn btn-save" onclick="toggleEdit(${index})">Закрыть</button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        function addValue(index) {
            const data = loadData();
            const input = document.getElementById(`input-${index}`);
            const value = Number(input.value);
            if (value !== 0) {
                data[index].values.push(value);
                data[index].synced = false;
                saveData(data);
                input.value = '';
                render();
            } else { alert('Введите число'); }
        }

        function toggleEdit(index) {
            document.getElementById(`edit-${index}`).classList.toggle('show');
        }

        function changeValue(index, valueIndex, newValue) {
            const data = loadData();
            data[index].values[valueIndex] = Number(newValue);
            data[index].synced = false;
            saveData(data);
            render();
        }

        function removeValue(index, valueIndex) {
            const data = loadData();
            data[index].values.splice(valueIndex, 1);
            data[index].synced = false;
            saveData(data);
            render();
        }

        function getUnsyncedData() {
            return loadData().filter(item => !item.synced && item.values.length > 0);
        }

        function markAsSynced() {
            const data = loadData();
            data.forEach(item => { if (item.values.length > 0) item.synced = true; });
            saveData(data);
            render();
        }

        async function sendDataToGoogle(dataToSend) {
            try {
                const rows = dataToSend.map(item => ({
                    id: item.id, name: item.name, time: item.time,
                    price: item.values.join('+'), quantity: calculateSum(item.values)
                }));
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: rows })
                });
                return true;
            } catch (error) {
                console.error("Ошибка:", error);
                return false;
            }
        }

        async function runSync() {
            const unsynced = getUnsyncedData();
            if (unsynced.length === 0) return alert('✅ Нет новых данных. Всё уже сохранено.');
            if (!navigator.onLine) return alert('🔴 Нет интернета!');
            if (!confirm(`📤 Отправить ${unsynced.length} новых записей в Google?`)) return;
            
            const success = await sendDataToGoogle(unsynced);
            if (success) {
                markAsSynced();
                alert('✅ Данные успешно отправлены!');
            } else {
                alert('❌ Ошибка отправки. Проверьте интернет.');
            }
        }

        async function exportAndReset() {
            const data = loadData();
            const unsynced = getUnsyncedData();
            if (!confirm('️ Сохранить в Google, скачать Excel (формат А4) и сбросить приложение?')) return;

            let googleSynced = false;
            if (navigator.onLine && unsynced.length > 0) {
                googleSynced = await sendDataToGoogle(unsynced);
                if (googleSynced) markAsSynced();
            } else if (unsynced.length === 0) {
                googleSynced = true;
            }

            // --- ГЕНЕРАЦИЯ EXCEL ДЛЯ ПЕЧАТИ НА А4 ---
            const wb = XLSX.utils.book_new();
            const wsData = [
                ['ID', 'Наименование работ с диапазоном объемов (кг)', 'Норма времени', 'Расценка', 'Количество']
            ];
            
            data.forEach(item => {
                const priceStr = item.values.length > 0 ? item.values.join('+') : "";
                const sum = calculateSum(item.values);
                wsData.push([item.id, item.name, item.time, priceStr, sum]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // 1. Настройка ширины столбцов
            ws['!cols'] = [
                { wch: 4 },  // ID: минимальная
                { wch: 50 }, // Наименование: широкая
                { wch: 12 }, // Норма времени: минимальная для цифр
                { wch: 45 }, // Расценка: широкая для длинных строк
                { wch: 12 }  // Количество
            ];

            // 2. Перенос текста и форматирование для ВСЕХ ячеек данных
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = 1; R <= range.e.r; ++R) {
                for (let C = 0; C <= range.e.c; ++C) {
                    const cell = ws[XLSX.utils.encode_cell({r: R, c: C})];
                    if (cell) {
                        // Перенос текста для столбцов B (Наименование) и D (Расценка)
                        const wrapText = (C === 1 || C === 3);
                        cell.s = {
                            font: { name: 'Times New Roman', sz: 10 }, // Уменьшенный шрифт 10pt
                            alignment: {
                                wrapText: wrapText,
                                vertical: 'center',
                                horizontal: (C === 0 || C === 2 || C === 4) ? 'center' : 'left'
                            }
                        };
                    }
                }
            }

            // Форматирование заголовков (жирный шрифт, центрирование)
            for (let C = 0; C <= range.e.c; ++C) {
                const cell = ws[XLSX.utils.encode_cell({r: 0, c: C})];
                if (cell) {
                    cell.s = {
                        font: { name: 'Times New Roman', sz: 11, bold: true },
                        alignment: { wrapText: true, vertical: 'center', horizontal: 'center' }
                    };
                }
            }

            // 3. Настройки страницы для печати на А4
            ws['!margins'] = { left: 0.4, right: 0.4, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 };
            ws['!pagesetup'] = { 
                paperSize: 9,          // 9 = A4
                orientation: 1,        // 1 = Портретная ориентация
                fitToPage: true,       // Вписать в страницу
                fitToWidth: 1,         // Вписать в 1 страницу по ширине
                fitToHeight: 1         // Вписать в 1 страницу по высоте (автоматически уменьшит шрифт)
            };

            XLSX.utils.book_append_sheet(wb, ws, 'Нормы цеха 188');
            XLSX.writeFile(wb, `Нормы_188_${new Date().toISOString().split('T')[0]}.xlsx`);

            setTimeout(() => {
                if (googleSynced) {
                    if (confirm('✅ Сохранено в Google и таблица А4 скачана!\n\nОчистить приложение для новой смены?')) {
                        localStorage.removeItem('shop188_data');
                        location.reload();
                    }
                } else {
                    alert('⚠️ Google Таблица не обновлена.\n\nНо файл Excel скачан в "Загрузки"!\nПриложение НЕ очищено.');
                }
            }, 1000);
        }

        function checkSyncStatus() {
            const hasData = loadData().some(item => item.values.length > 0);
            document.getElementById('sync-btn').classList.toggle('show', hasData);
            document.getElementById('export-btn').classList.toggle('show', hasData);
        }

        function updateStatus() {
            const bar = document.getElementById('status-bar');
            if (navigator.onLine) {
                bar.textContent = ' Онлайн';
                bar.className = 'status-bar';
            } else {
                bar.textContent = ' Оффлайн - данные сохраняются локально';
                bar.className = 'status-bar offline';
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        render();
        updateStatus();
        checkSyncStatus();
    </script>
</body>
</html>
